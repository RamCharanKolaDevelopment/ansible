- name: filters demo
  hosts: local
  connection: local
  vars:
    topics: linux, ansible, shell, terraform
    tagsMap:
      name: ansible
      project: roboshop
      component: catalogue
    tagsList: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]
  tasks:
  - name: filters
    ansible.builtin.debug:
      msg: "Hi Ram Charan {{ greetings | default('Good morning')}}"
  
  - name: split filter & printing output
    ansible.builtin.debug:
      msg: "{{ topics | split(', ') }}"

  - name: map to list filter
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: list to map filter
    ansible.builtin.debug:
      msg: "{{ agsLis | items2dict }}"
