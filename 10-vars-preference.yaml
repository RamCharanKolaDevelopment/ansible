- name: variables preference/preceedence
  hosts: local
  connection: local
  vars:
    NAME: "Variable from Play"
  var_files:
  - course.yaml
  var_prompts:
  - name: NAME
    prompt: Please enter name
    private: false
  tasks:
  - name: print variables preference/preceedence
    vars:
      NAME: "Variable from Tasks"
    ansible.builtin.debug:
      msg: "Hi {{ NAME }}"